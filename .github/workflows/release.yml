name: Release

on:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: meal_list_linux_amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: meal_list_linux_arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: meal_list_darwin_arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Set up QEMU
        if: contains(matrix.target, 'aarch64-unknown-linux-musl')
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            docker run --rm --platform linux/arm64 \
              -v ${{ github.workspace }}:/workspace \
              -w /workspace/api \
              rust:alpine \
              sh -c "apk add --no-cache sqlite-dev sqlite-static && \
                     cargo build --release && \
                     cd target/release && \
                     tar czf /workspace/api/${{ matrix.artifact }}.tar.gz meal_list"
          else
            cargo build --release --target ${{ matrix.target }}
            cd target/${{ matrix.target }}/release
            tar czf ../../../${{ matrix.artifact }}.tar.gz meal_list
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: api/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Delete previous release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag

      - uses: actions/download-artifact@v4
        with:
          pattern: meal_list_*
          merge-multiple: true
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest artifacts/* \
            --title "latest" \
            --notes "Automated build from ${{ github.sha }}" \
            --prerelease
